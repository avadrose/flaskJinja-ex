<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Fill out this form</h1>

    <form action="/story">

        {% for prompt in prompts %}
        <p>
            <label>{{ prompt }}</label>
            <input type="text" name="{{ prompt }}">
        </p>
        {% endfor %}

        <button>Submit</button>

    </form>
    
</body>
</html>
